<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- login form -->
    <div id="logInDiv" class="w-[500px] mx-auto mt-40">
        <div class="fieldset bg-base-200 border-base-300  rounded-box w-full border p-4">
        
            <div class="flex flex-col gap-3 justify-center items-center">
                <img src="./assets/github-logo.png" alt="github-logo" class="w-[80px]">
                <h1 class="font-bold text-xl">GitHub Issues Tracker</h1>
                <p>Sign in to manage your issues</p>
            </div>

            <label class="label">Username</label>
            <input id="userName" type="text" class="input input-bordered w-full" placeholder="Enter Username"/>
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label">Password</label>
            <input id="password" type="password" class="input input-bordered w-full" placeholder="Password" />
            <p class="text-[#4A00FF]">Default: admin123</p>

            
            <div class="fieldset bg-base-100 border-base-300 rounded-box w-64 border p-4">
                <legend class="fieldset-legend">Login options</legend>
                <label class="label">
                    <input type="checkbox" checked="checked" class="checkbox" />
                    Remember me
                </label>
            </div>


            <button id="signInBtn" onclick="signIn()" class="btn btn-primary mt-4">Sign in</button>

            <br>
            <br>

            <hr>

            <div class="text-center">
                <p>OR</p>
                <p class="">Demo Credentials</p>
                <br>
                <p class="font-bold">Username : admin</p>
                <p class="font-bold">Password : admin123</p>
            </div>
        </div>

        
    </div>



    
    <!-- main website -->
    <main id="mainSection" class="">
        <header class="sticky top-0 z-50">
            <nav class="">
                <div class="navbar bg-base-100 shadow-sm">
                    <div class="flex-1">
                        <div class="flex gap-4 items-center">
                            <img src="./assets/github-logo.png" alt="github-logo" class="w-[40px]">
                            <p class="font-bold text-xl">GitHub Issues Tracker</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input id="searchInput" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                        <button id="searchBtn" onclick="searchCard(allBtnArray)" class="btn btn-primary w-[120px]">Search</button>
                    </div>
                </div>
            </nav>
        </header>

        <section class="w-[80%] mx-auto mt-20">

            <div id="allBtnContainer" class="flex gap-3 sticky top-[70px] z-40 bg-base-200 border-base-300 border rounded-box p-6">
                <button id="btnAll" onclick="allBtnActive()" class="btn btn-primary w-[120px]">All</button>
                <button id="btnOpen" onclick="openBtnActive()" class="btn btn-outline w-[120px]">Open</button>
                <button id="btnClosed" onclick="closedBtnActive()" class="btn btn-outline w-[120px]">Closed</button>
            </div>

            <div class="bg-base-200 border-base-300 border rounded-box p-6 mt-10">

                <div class="flex justify-between">

                    <div class="flex gap-2">

                        <img src="./assets/Aperture.png" alt="Aperture" class="w-[50px]">

                        <div>
                            <p class="font-bold text-2xl"><span id="totalIssues">50</span> Issues</p>
                            <p>Track and manage your project issues</p>
                        </div>
                    </div>

                    <div class="flex gap-10">
                        <div class="flex items-center gap-3">
                            <p class="w-[12px] h-[12px] bg-[#00a96e] rounded-full"></p>
                            <p>Open</p>
                        </div>

                        <div class="flex items-center gap-3">
                            <p class="w-[12px] h-[12px] bg-[#a855f7] rounded-full"></p>
                            <p>Closed</p>
                        </div>
                    </div>
                </div>

                
                <div id="cardContainer" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 p-6">

                    <!-- dynamically all cards show -->
                </div>

                <!-- loading spinner -->
                <div id="loadingSpinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-bars loading-xl"></span>
                </div>

            </div>
        </section>


        <section>
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal.showModal()">open modal</button> -->

            <dialog id="my_modal" class="modal">

                <div class="modal-box">

                    <!-- <h3 class="text-lg font-bold">Hello!</h3>
                    <p class="py-4">Press ESC key or click the button below to close</p> -->

                    <div id="cardModalDetails">

                        

                    </div>

                    <div class="modal-action">
                        
                        <form method="dialog">
                            <!-- if there is a button in form, it will close the modal -->
                            <button class="btn btn-primary border-none">Close</button>
                        </form>
                    </div>
                </div>
            </dialog>
        </section>

    </main>


    <script src="script.js"></script>
</body>
</html>
